<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toko Elektronik - Login</title>
  <link rel="stylesheet" href="/css/login.css" />
  <link rel="icon" type="image/svg" href="assets/favicon.svg" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-header">
        <h1><span>Daftar</span> Produk</h1>
        <p>Silakan login untuk melanjutkan</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="nama">Nama</label>
          <input type="text" id="nama" placeholder="Masukkan nama" required autofocus />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Masukkan password" required />
        </div>
        <p id="errorMsg" class="error-msg"></p>
        <button type="submit" class="btn-submit">Login</button>
      </form>
      <p class="auth-link">Belum punya akun? <a href="register.html">Daftar sekarang</a></p>
      <a href="dashboard.html" class="back-link">&larr; Kembali ke Dashboard</a>
    </div>
  </div>

  <button id="darkModeBtn" class="dark-toggle">
    <img id="moonIcon" src="assets/moon.svg" alt="Dark" width="20" height="20" />
    <img id="sunIcon" src="assets/sun.svg" alt="Light" width="20" height="20" style="display:none" />
  </button>

  <script src="js/darkMode.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
